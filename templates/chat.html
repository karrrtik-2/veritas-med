<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>DSPy Medical AI</title>
		<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
		<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.5.0/css/all.css" integrity="sha384-B4dIYHKNBt8Bc12p+WXckhzcICo0wtJAoU8YZTY5qE0Id1GSseTk6S+L3BlXeVIU" crossorigin="anonymous">
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
		<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}"/>
	</head>

	<body>
		<div class="container-fluid h-100">
			<div class="row justify-content-center h-100">
				<div class="col-md-8 col-xl-6 chat">
					<div class="card">
						<div class="card-header msg_head">
							<div class="d-flex bd-highlight">
								<div class="img_cont">
									<img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img">
									<span class="online_icon"></span>
								</div>
								<div class="user_info">
									<span>DSPy Medical AI</span>
									<p id="status_text">Self-Optimizing · Multi-Agent · Evidence-Based</p>
								</div>
							</div>
						</div>
						<div id="messageFormeight" class="card-body msg_card_body">

						</div>
						<div class="card-footer">
							<form id="messageArea" class="input-group">
                                <input type="text" id="text" name="msg" placeholder="Ask a medical question..." autocomplete="off" class="form-control type_msg" required/>
								<div class="input-group-append">
									<button type="submit" id="send" class="input-group-text send_btn"><i class="fas fa-location-arrow"></i></button>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>

		<script>
			const conversationHistory = [];

			function formatBotResponse(data) {
				let html = data.answer || data;

				// If structured response with metadata
				if (typeof data === 'object' && data.confidence !== undefined) {
					const confidence = Math.round(data.confidence * 100);
					const safetyBadge = {
						'safe': '<span class="badge badge-success">Safe</span>',
						'caution': '<span class="badge badge-warning">Caution</span>',
						'unsafe': '<span class="badge badge-danger">Unsafe</span>',
						'requires_professional': '<span class="badge badge-info">Consult Professional</span>'
					}[data.safety_level] || '';

					html = data.answer;
					html += `<div class="meta_info mt-2">${safetyBadge} <small>Confidence: ${confidence}% · ${data.intent}</small></div>`;
				}
				return html;
			}

			$(document).ready(function() {
				$("#messageArea").on("submit", function(event) {
					event.preventDefault();
					const date = new Date();
					const str_time = date.getHours() + ":" + String(date.getMinutes()).padStart(2, '0');
					var rawText = $("#text").val();

					var userHtml = '<div class="d-flex justify-content-end mb-4"><div class="msg_cotainer_send">' + rawText + '<span class="msg_time_send">'+ str_time + '</span></div><div class="img_cont_msg"><img src="https://i.ibb.co/d5b84Xw/Untitled-design.png" class="rounded-circle user_img_msg"></div></div>';

					$("#text").val("");
					$("#messageFormeight").append(userHtml);

					// Show typing indicator
					var typingHtml = '<div class="d-flex justify-content-start mb-4" id="typing"><div class="img_cont_msg"><img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img_msg"></div><div class="msg_cotainer"><em>Reasoning...</em></div></div>';
					$("#messageFormeight").append(typingHtml);
					$("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);

					// Call structured API
					$.ajax({
						contentType: "application/json",
						data: JSON.stringify({
							query: rawText,
							conversation_history: conversationHistory.slice(-3),
							include_reasoning: false,
							include_sources: true
						}),
						type: "POST",
						url: "/api/v1/chat",
					}).done(function(data) {
						$("#typing").remove();

						conversationHistory.push({user: rawText, assistant: data.answer});

						var botContent = formatBotResponse(data);
						var botHtml = '<div class="d-flex justify-content-start mb-4"><div class="img_cont_msg"><img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img_msg"></div><div class="msg_cotainer">' + botContent + '<span class="msg_time">' + str_time + '</span></div></div>';
						$("#messageFormeight").append($.parseHTML(botHtml));
						$("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);
					}).fail(function() {
						$("#typing").remove();

						// Fallback to legacy endpoint
						$.ajax({
							data: { msg: rawText },
							type: "POST",
							url: "/get",
						}).done(function(data) {
							var botHtml = '<div class="d-flex justify-content-start mb-4"><div class="img_cont_msg"><img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" class="rounded-circle user_img_msg"></div><div class="msg_cotainer">' + data + '<span class="msg_time">' + str_time + '</span></div></div>';
							$("#messageFormeight").append($.parseHTML(botHtml));
							$("#messageFormeight").scrollTop($("#messageFormeight")[0].scrollHeight);
						});
					});
				});
			});
		</script>
    </body>
</html>
